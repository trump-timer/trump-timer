name: Content correction
description: Report unclear wording, outdated context, or source issues.
title: "[Content]: "
labels: ["type: content", "status: needs triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page URL
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
      description: Include current wording, suggested wording, and supporting source links.
    validations:
      required: true
